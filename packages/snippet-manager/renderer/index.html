<!doctype html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width">
<title>Snippet Manager</title><link rel="stylesheet" href="styles.css"></head>
<body><aside><h1>Snippets</h1><input id="search" placeholder="Buscar..."><button id="new">+ Novo</button><div id="list"></div></aside>
<main><input id="title" placeholder="Título"><div class="row"><input id="language" placeholder="Linguagem"><input id="tags" placeholder="tags, separadas, por vírgula"></div>
<textarea id="code" spellcheck="false" placeholder="Cole seu código aqui"></textarea>
<footer><button id="delete" class="danger">Excluir</button><span></span><button id="copy">Copiar</button><button id="save">Salvar</button></footer></main>
<script src="renderer.js"></script></body></html>
